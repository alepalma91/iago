name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-arm64:
    name: Build (arm64)
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Compile CLI binary
        run: |
          mkdir -p dist
          bun build --compile --minify src/index.ts --outfile dist/iago

      - name: Build menu bar app
        run: make menubar-build

      - name: Copy menu bar binary
        run: cp extras/menubar/.build/IagoBar dist/iago-bar

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf dist/iago-${VERSION}-darwin-arm64.tar.gz -C dist iago iago-bar
          shasum -a 256 dist/iago-${VERSION}-darwin-arm64.tar.gz > dist/iago-${VERSION}-darwin-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: dist-arm64
          path: dist/*.tar.gz*

  build-x64:
    name: Build (x86_64)
    runs-on: macos-13  # Intel runner
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile CLI binary
        run: |
          mkdir -p dist
          bun build --compile --minify src/index.ts --outfile dist/iago

      - name: Build menu bar app
        run: |
          # x86_64 target for Intel
          mkdir -p extras/menubar/.build
          swiftc -O -o extras/menubar/.build/IagoBar \
            -sdk $(xcrun --show-sdk-path) \
            -target x86_64-apple-macosx13.0 \
            -framework AppKit \
            -lsqlite3 \
            extras/menubar/Sources/TheReviewerBar/main.swift \
            extras/menubar/Sources/TheReviewerBar/Models.swift \
            extras/menubar/Sources/TheReviewerBar/DatabaseManager.swift \
            extras/menubar/Sources/TheReviewerBar/StatusBarController.swift

      - name: Copy menu bar binary
        run: cp extras/menubar/.build/IagoBar dist/iago-bar

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf dist/iago-${VERSION}-darwin-x86_64.tar.gz -C dist iago iago-bar
          shasum -a 256 dist/iago-${VERSION}-darwin-x86_64.tar.gz > dist/iago-${VERSION}-darwin-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: dist-x64
          path: dist/*.tar.gz*

  release:
    name: Create Release
    needs: [build-arm64, build-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
