name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-arm64:
    name: Build (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Compile CLI binary
        run: |
          mkdir -p dist
          bun build --compile --minify src/index.ts --outfile dist/iago

      - name: Build menu bar app
        run: make menubar-build

      - name: Copy menu bar binary
        run: cp extras/menubar/.build/IagoBar dist/iago-bar

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp install-prompts/system.md install-prompts/instructions.md dist/
          tar -czf dist/iago-${VERSION}-darwin-arm64.tar.gz -C dist iago iago-bar system.md instructions.md
          shasum -a 256 dist/iago-${VERSION}-darwin-arm64.tar.gz > dist/iago-${VERSION}-darwin-arm64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: dist-arm64
          path: dist/*.tar.gz*

  build-x64:
    name: Build (x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile CLI binary
        run: |
          mkdir -p dist
          bun build --compile --minify src/index.ts --outfile dist/iago

      - name: Build menu bar app
        run: |
          mkdir -p extras/menubar/.build
          swiftc -O -o extras/menubar/.build/IagoBar \
            -sdk $(xcrun --show-sdk-path) \
            -target x86_64-apple-macosx13.0 \
            -framework AppKit \
            -lsqlite3 \
            extras/menubar/Sources/TheReviewerBar/main.swift \
            extras/menubar/Sources/TheReviewerBar/Models.swift \
            extras/menubar/Sources/TheReviewerBar/DatabaseManager.swift \
            extras/menubar/Sources/TheReviewerBar/StatusBarController.swift

      - name: Copy menu bar binary
        run: cp extras/menubar/.build/IagoBar dist/iago-bar

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp install-prompts/system.md install-prompts/instructions.md dist/
          tar -czf dist/iago-${VERSION}-darwin-x86_64.tar.gz -C dist iago iago-bar system.md instructions.md
          shasum -a 256 dist/iago-${VERSION}-darwin-x86_64.tar.gz > dist/iago-${VERSION}-darwin-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: dist-x64
          path: dist/*.tar.gz*

  release:
    name: Publish Release
    needs: [build-arm64, build-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "${GITHUB_REF_NAME}" \
            --repo alepalma91/iago \
            --title "iago ${VERSION}" \
            --generate-notes \
            artifacts/*.tar.gz

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA_ARM64=$(cat artifacts/iago-${VERSION}-darwin-arm64.tar.gz.sha256 | awk '{print $1}')
          SHA_X64=$(cat artifacts/iago-${VERSION}-darwin-x86_64.tar.gz.sha256 | awk '{print $1}')

          gh repo clone alepalma91/homebrew-iago /tmp/tap
          cd /tmp/tap

          cat > Formula/iago.rb << RUBY
class Iago < Formula
  desc "AI-powered PR review daemon — monitors GitHub and reviews PRs with Claude Code"
  homepage "https://github.com/alepalma91/iago"
  version "${VERSION}"
  license "MIT"

  depends_on "gh"
  depends_on :macos

  on_macos do
    on_arm do
      url "https://github.com/alepalma91/iago/releases/download/v${VERSION}/iago-${VERSION}-darwin-arm64.tar.gz"
      sha256 "${SHA_ARM64}"
    end
    on_intel do
      url "https://github.com/alepalma91/iago/releases/download/v${VERSION}/iago-${VERSION}-darwin-x86_64.tar.gz"
      sha256 "${SHA_X64}"
    end
  end

  def install
    bin.install "iago"
    bin.install "iago-bar" if File.exist?("iago-bar")
    (pkgshare/"prompts").install "system.md"
    (pkgshare/"prompts").install "instructions.md"
  end

  def post_install
    config_dir = etc/"iago"
    prompts_dir = config_dir/"prompts"
    prompts_dir.mkpath

    unless (prompts_dir/"system.md").exist?
      cp pkgshare/"prompts/system.md", prompts_dir/"system.md"
    end
    unless (prompts_dir/"instructions.md").exist?
      cp pkgshare/"prompts/instructions.md", prompts_dir/"instructions.md"
    end

    unless (config_dir/"config.yaml").exist?
      (config_dir/"config.yaml").write <<~YAML
        # iago configuration
        github:
          poll_interval: 60s
          watched_repos: []
          ignored_repos: []
        launchers:
          max_parallel: 3
          default_tools:
            - claude
        prompts:
          system_prompt: #{prompts_dir}/system.md
          instructions: #{prompts_dir}/instructions.md
        notifications:
          native: true
        dashboard:
          enabled: true
          port: 1460
      YAML
    end

    user_config = Pathname.new(Dir.home)/".config/iago"
    unless user_config.exist?
      user_config.mkpath
      FileUtils.ln_sf config_dir/"config.yaml", user_config/"config.yaml"
      FileUtils.ln_sf config_dir/"prompts", user_config/"prompts"
    end
  end

  def caveats
    <<~EOS
      iago requires Claude Code CLI to review PRs:
        https://docs.anthropic.com/en/docs/claude-code

      For rich notifications with action buttons:
        brew install alerter

      Config: #{etc}/iago/config.yaml (symlinked to ~/.config/iago/)
      Data:   ~/.local/share/iago/

      To start: iago start
      To setup: iago setup
    EOS
  end

  test do
    assert_match "iago", shell_output("#{bin}/iago --help 2>&1", 0)
  end
end
RUBY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/iago.rb
          git commit -m "Update iago to ${VERSION}"
          git push
